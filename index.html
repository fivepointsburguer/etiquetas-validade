<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Points | Gestão de Etiquetas</title>
    <style>
        :root {
            --primary: #800000;
            --accent: #ff4d4d;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --radius-main: 16px;
            --radius-btn: 12px;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .container { width: 100%; max-width: 500px; }
        .fp-content-card { background: white; border-radius: var(--radius-main); padding: 25px; box-shadow: 0 8px 30px rgba(128,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: var(--radius-btn); box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: var(--radius-btn); font-weight: bold; cursor: pointer; color: white; background: var(--primary); margin-top: 10px; }
        .btn-success { background: #5cb85c; }
        .data-item { background: #f9f9f9; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; width: 60mm; }
            .etiqueta { width: 60mm; height: 39mm; padding: 2mm; text-align: left; page-break-after: always; font-family: Arial; border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="fp-content-card no-print">
        <h2>🏷️ Imprimir Etiqueta</h2>
        <div class="form-group">
            <label>Responsável:</label>
            <select id="sel-user"></select>
        </div>
        <div class="form-group">
            <label>Produto:</label>
            <select id="sel-prod"></select>
        </div>
        <div class="form-group">
            <label>Quantidade:</label>
            <input type="number" id="sel-qty" value="1" min="1">
        </div>
        <button onclick="handlePrint()">IMPRIMIR</button>
    </div>

    <div class="fp-content-card no-print">
        <h2>🍔 Produtos</h2>
        <input type="text" id="new-prod-name" placeholder="Nome do Produto">
        <input type="number" id="new-prod-code" placeholder="Código">
        <button class="btn-success" onclick="saveProduct()">+ SALVAR PRODUTO</button>
        <div id="product-list"></div>
    </div>

    <div class="fp-content-card no-print">
        <h2>👥 Equipe</h2>
        <input type="text" id="new-emp-name" placeholder="Nome do Funcionário">
        <button class="btn-success" onclick="saveEmployee()">+ SALVAR FUNCIONÁRIO</button>
        <div id="emp-list"></div>
    </div>
</div>

<div id="print-area"></div>

<script>
    let db = JSON.parse(localStorage.getItem('fp_db')) || { products: [], employees: [] };

    function updateUI() {
        localStorage.setItem('fp_db', JSON.stringify(db));
        
        const uSel = document.getElementById('sel-user');
        uSel.innerHTML = '<option value="">Selecione...</option>';
        db.employees.forEach(e => uSel.innerHTML += `<option value="${e}">${e}</option>`);

        const pSel = document.getElementById('sel-prod');
        pSel.innerHTML = '<option value="">Selecione...</option>';
        db.products.forEach(p => pSel.innerHTML += `<option value="${p.name}" data-code="${p.code}">${p.code} - ${p.name}</option>`);

        const pList = document.getElementById('product-list');
        pList.innerHTML = '';
        db.products.forEach((p, i) => pList.innerHTML += `<div class="data-item">${p.code} - ${p.name} <button onclick="delProd(${i})" style="width:auto; background:red;">X</button></div>`);

        const eList = document.getElementById('emp-list');
        eList.innerHTML = '';
        db.employees.forEach((e, i) => eList.innerHTML += `<div class="data-item">${e} <button onclick="delEmp(${i})" style="width:auto; background:red;">X</button></div>`);
    }

    function saveProduct() {
        const name = document.getElementById('new-prod-name').value.toUpperCase();
        const code = document.getElementById('new-prod-code').value;
        if(!name || !code) return alert("Preencha tudo");
        db.products.push({name, code});
        updateUI();
    }

    function saveEmployee() {
        const name = document.getElementById('new-emp-name').value.toUpperCase();
        if(!name) return alert("Preencha");
        db.employees.push(name);
        updateUI();
    }

    function delProd(i) { db.products.splice(i, 1); updateUI(); }
    function delEmp(i) { db.employees.splice(i, 1); updateUI(); }

    function handlePrint() {
        const user = document.getElementById('sel-user').value;
        const prod = document.getElementById('sel-prod');
        const qty = document.getElementById('sel-qty').value;
        if(!user || !prod.value) return alert("Selecione tudo");
        
        const pArea = document.getElementById('print-area');
        pArea.innerHTML = '';
        const now = new Date().toLocaleString();
        for(let i=0; i<qty; i++) {
            pArea.innerHTML += `<div class="etiqueta"><h1>${prod.value}</h1><p><b>COD:</b> ${prod.options[prod.selectedIndex].dataset.code}<br><b>DATA:</b> ${now}<br><b>RESP:</b> ${user}</p></div>`;
        }
        window.print();
    }

    updateUI();
</script>
</body>
</html>
