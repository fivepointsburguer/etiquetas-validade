<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Points | Etiquetas 6x4</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --card: #ffffff;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; background: var(--primary); display: flex; justify-content: center; padding: 0; position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 15px 20px; color: #bdc3c7; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .nav-item.active { color: white; border-bottom: 4px solid var(--accent); }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .page { display: none; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 400px; }
        .page.active { display: block; }
        .header { text-align: center; margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 18px; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #666; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; background: #fff; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-save { background: var(--success); color: white; }
        
        #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .pin-box { background: white; padding: 30px; border-radius: 12px; text-align: center; width: 300px; }
        
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }

        #print-area { display: none; }

        @media print {
            @page { size: 60mm 40mm; margin: 0; }
            body { background: white; margin: 0; padding: 0; }
            .no-print, nav, .container, #pin-overlay { display: none !important; }
            #print-area { display: block !important; width: 60mm; position: absolute; left: 0; top: 0; margin: 0; padding: 0; }
            
            .etiqueta { 
                width: 60mm; 
                height: 39mm; 
                padding: 2mm 3mm; 
                box-sizing: border-box; 
                text-align: left; 
                page-break-after: always; 
                color: black; 
                background: white;
                font-family: Arial, sans-serif; 
                overflow: hidden; 
            }
            
            .etiqueta h1 { 
                font-size: 10pt; 
                font-weight: bold;
                margin: 0 0 2mm 0; 
                text-transform: uppercase; 
                border-bottom: 1.5px solid black; 
                text-align: center; 
                white-space: normal;
                line-height: 1.1; 
                max-height: 12mm;
                display: block;
                overflow: hidden;
            }
            
            .etiqueta p { font-size: 9pt; margin: 1mm 0; line-height: 1.2; font-weight: normal; }
            .etiqueta .footer { font-size: 7pt; font-weight: bold; text-align: center; margin-top: 2mm; border-top: 0.5px dashed black; padding-top: 1mm; }
        }
    </style>
</head>
<body>

    <nav class="no-print">
        <div class="nav-item active" onclick="showPage('print', false)">🖨️ Imprimir</div>
        <div class="nav-item" onclick="showPage('products', true)">🍔 Produtos</div>
        <div class="nav-item" onclick="showPage('reports', true)">📊 Relatórios</div>
    </nav>

    <div class="container no-print">
        <div id="page-print" class="page active">
            <div class="header">
                <h1 style="color: var(--primary); margin: 0;">Five Points</h1>
                <p style="font-size:12px; color:#666; margin-top: 5px;">Etiquetas de Validade</p>
            </div>
            
            <div class="form-group">
                <label>Responsável:</label>
                <select id="sel-user">
                    <option value="">Selecione o funcionário...</option>
                    <option value="ENDRIGO">ENDRIGO</option>
                    <option value="RENATA">RENATA</option>
                    <option value="ELIANE">ELIANE</option>
                    <option value="JOÃO MATEUS">JOÃO MATEUS</option>
                    <option value="MARCELO">MARCELO</option>
                    <option value="FERNANDO">FERNANDO</option>
                    <option value="EDUARDO">EDUARDO</option>
                    <option value="BRUNO">BRUNO</option>
                </select>
            </div>

            <div class="form-group">
                <label>Produto:</label>
                <select id="sel-prod">
                    <option value="">Aguardando banco de dados...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" id="sel-qty" value="1" min="1">
            </div>

            <button class="btn-main" onclick="handlePrint()">IMPRIMIR AGORA</button>
            <p id="cloud-status" style="font-size:10px; text-align:center; margin-top:20px; color:#999;">Versão 7.2 - Bug Corrigido</p>
        </div>

        <div id="page-products" class="page">
            <h2>Gerenciar Produtos</h2>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="new-prod-name">
            </div>
            <div class="form-group">
                <label>Validade:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="new-prod-val">
                    <select id="new-prod-unit">
                        <option value="days">Dias</option>
                        <option value="hours">Horas</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="saveNewProduct()">SALVAR PRODUTO</button>
            <button onclick="restoreDefault()" style="background:#eee; color:#666; margin-top:10px; font-size:11px;">RESTAURAR LISTA PADRÃO</button>
            <div id="product-list" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
        </div>

        <div id="page-reports" class="page">
            <h2>Relatório de Impressões</h2>
            <div class="table-container">
                <table id="report-table">
                    <thead><tr><th>Hora</th><th>Resp.</th><th>Prod.</th><th>Qtd</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <button onclick="downloadCSV()" style="margin-top:15px; background:#34495e; color:white;">BAIXAR CSV</button>
        </div>
    </div>

    <div id="pin-overlay">
        <div class="pin-box">
            <h3>Acesso Restrito</h3>
            <input type="password" id="pin-input" maxlength="4" style="text-align:center; font-size:24px; width:150px;">
            <button class="btn-main" onclick="checkPin()">ENTRAR</button>
            <button onclick="closePin()" style="background:none; color:#888;">Voltar</button>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        const MASTER_PIN = "1234"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8Ppo80LBtmovJfk_Q-ncqPyeg7Ns7jiXauNw235qLhBwK7ttI2I8ckDTgpiz0Ti0/exec"; 
        const defaultProducts = [{"name": "AÇÚCAR BRANCO", "val": 90, "unit": "days"}, {"name": "AÇÚCAR MASCAVO", "val": 90, "unit": "days"}, {"name": "ALFACE", "val": 2, "unit": "days"}, {"name": "ALHO EM PÓ", "val": 90, "unit": "days"}, {"name": "AMIDO DE MILHO", "val": 60, "unit": "days"}, {"name": "BACON CONGELADO", "val": 90, "unit": "days"}, {"name": "BACON EMPANADO", "val": 3, "unit": "days"}, {"name": "BACON FAROFA", "val": 30, "unit": "days"}, {"name": "BACON FATIADO", "val": 3, "unit": "days"}, {"name": "BACON IN NATURA", "val": 3, "unit": "days"}, {"name": "BARBECUE SPICY (CHINATOWN)", "val": 30, "unit": "days"}, {"name": "BIG FIVE", "val": 3, "unit": "days"}, {"name": "BURGER FRANGO EMPANADO", "val": 90, "unit": "days"}, {"name": "CANELA EM PÓ", "val": 90, "unit": "days"}, {"name": "CATCHUP", "val": 30, "unit": "days"}, {"name": "CATCHUP BISNAGA", "val": 30, "unit": "days"}, {"name": "CEBOLA BLACK ABERTA (POTE USO)", "val": 3, "unit": "days"}, {"name": "CEBOLA BLACK BEER", "val": 5, "unit": "days"}, {"name": "CEBOLA BRANCA", "val": 3, "unit": "days"}, {"name": "CEBOLA CRISPY", "val": 30, "unit": "days"}, {"name": "CEBOLA EM PÓ", "val": 90, "unit": "days"}, {"name": "CEBOLA ROXA", "val": 3, "unit": "days"}, {"name": "CHÁ EM PÓ", "val": 90, "unit": "days"}, {"name": "CHÁ PRONTO", "val": 3, "unit": "days"}, {"name": "CHEESE PILLOWS", "val": 90, "unit": "days"}, {"name": "CRAVO", "val": 90, "unit": "days"}, {"name": "CREME DE CHEDDAR", "val": 3, "unit": "days"}, {"name": "DADINHOS DE TAPIOCA", "val": 90, "unit": "days"}, {"name": "DOCE DE LEITE", "val": 30, "unit": "days"}, {"name": "FARINHA DE TRIGO", "val": 60, "unit": "days"}, {"name": "FARINHA DE ROSCA", "val": 60, "unit": "days"}, {"name": "FARINHA PANKO", "val": 60, "unit": "days"}, {"name": "GELEIA BACON", "val": 30, "unit": "days"}, {"name": "GELEIA BACON ABERTA (POTE USO)", "val": 15, "unit": "days"}, {"name": "GELEIA PIMENTA", "val": 30, "unit": "days"}, {"name": "GERGELIM", "val": 90, "unit": "days"}, {"name": "HAMBÚRGUER BOVINO", "val": 3, "unit": "days"}, {"name": "MAIONESE POTE", "val": 2, "unit": "days"}, {"name": "MAIONESE BISNAGA", "val": 2, "unit": "days"}, {"name": "MISTURA MAIONESE", "val": 2, "unit": "days"}, {"name": "MISTURA MOLHO FIVE", "val": 3, "unit": "days"}, {"name": "MOLHO FIVE POTE", "val": 3, "unit": "days"}, {"name": "MOLHO FIVE BISNAGA", "val": 3, "unit": "days"}, {"name": "MOSTARDA ABERTA", "val": 30, "unit": "days"}, {"name": "MOSTARDA EM GRÃOS", "val": 90, "unit": "days"}, {"name": "MOSTARDA EM PÓ", "val": 90, "unit": "days"}, {"name": "NUGGETS PACOTE ABERTO", "val": 30, "unit": "days"}, {"name": "NUGGETS PORCIONADO", "val": 3, "unit": "days"}, {"name": "ORÉGANO", "val": 90, "unit": "days"}, {"name": "PÃO BRIOCHE", "val": 5, "unit": "days"}, {"name": "PÃO DE FORMA", "val": 5, "unit": "days"}, {"name": "PÃO KIDS", "val": 5, "unit": "days"}, {"name": "PÁPRICA DEFUMADA", "val": 90, "unit": "days"}, {"name": "PÁPRICA DOCE", "val": 90, "unit": "days"}, {"name": "PICLES", "val": 30, "unit": "days"}, {"name": "PICLES ABERTO (POTE USO)", "val": 15, "unit": "days"}, {"name": "PIMENTA CALABRESA", "val": 90, "unit": "days"}, {"name": "PIMENTA DO REINO", "val": 90, "unit": "days"}, {"name": "PRESUNTO", "val": 5, "unit": "days"}, {"name": "PRESUNTO CONGELADO", "val": 90, "unit": "days"}, {"name": "QUEIJO CHEDDAR FATIADO", "val": 5, "unit": "days"}, {"name": "QUEIJO COALHO INTEIRO", "val": 5, "unit": "days"}, {"name": "QUEIJO COALHO FATIADO", "val": 5, "unit": "days"}, {"name": "QUEIJO EMPANADO", "val": 90, "unit": "days"}, {"name": "QUEIJO GORGONZOLA", "val": 5, "unit": "days"}, {"name": "QUEIJO MUSSARELA", "val": 5, "unit": "days"}, {"name": "QUEIJO PRATO FATIADO", "val": 5, "unit": "days"}, {"name": "QUEIJO PROVOLONE FATIADO", "val": 5, "unit": "days"}, {"name": "QUEIJO PROVOLONE+GORGONZOLA", "val": 5, "unit": "days"}, {"name": "RUB", "val": 90, "unit": "days"}, {"name": "RÚCULA", "val": 2, "unit": "days"}, {"name": "SAL FINO", "val": 90, "unit": "days"}, {"name": "SAL GROSSO", "val": 90, "unit": "days"}, {"name": "SAL TEMPERADO", "val": 90, "unit": "days"}, {"name": "SAZON", "val": 90, "unit": "days"}, {"name": "SMASH DE CARNE", "val": 3, "unit": "days"}, {"name": "SMASH LINGUICA", "val": 3, "unit": "days"}, {"name": "SMASH LINGUICA CONGELADA", "val": 90, "unit": "days"}, {"name": "TOMATE", "val": 2, "unit": "days"}, {"name": "XAROPE ABACAXI", "val": 30, "unit": "days"}, {"name": "XAROPE CRAMBERRY", "val": 30, "unit": "days"}, {"name": "XAROPE MAÇÃ VERDE", "val": 30, "unit": "days"}, {"name": "XAROPE PÊSSEGO", "val": 30, "unit": "days"}];

        let db = JSON.parse(localStorage.getItem('fp_db')) || { products: defaultProducts, logs: [] };

        function showPage(pageId, protected) {
            if(protected) {
                document.getElementById('pin-overlay').style.display = 'flex';
                document.getElementById('pin-input').focus();
                window.currentTargetPage = pageId;
            } else { switchPage(pageId); }
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === MASTER_PIN) {
                switchPage(window.currentTargetPage);
                closePin();
            } else { alert("PIN Incorreto!"); }
            document.getElementById('pin-input').value = '';
        }

        function closePin() { document.getElementById('pin-overlay').style.display = 'none'; }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            const items = document.querySelectorAll('.nav-item');
            if(pageId === 'print') items[0].classList.add('active');
            if(pageId === 'products') items[1].classList.add('active');
            if(pageId === 'reports') items[2].classList.add('active');
        }

        function updateUI() {
            localStorage.setItem('fp_db', JSON.stringify(db));
            const sel = document.getElementById('sel-prod');
            
            // Salvar a seleção atual antes de atualizar a lista para não perder o foco
            const currentSelection = sel.value;
            
            sel.innerHTML = '<option value="">Selecione o produto...</option>';
            db.products.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
                sel.innerHTML += `<option value="${p.name}" data-val="${p.val}" data-unit="${p.unit}">${p.name}</option>`;
            });

            // Restaurar a seleção se ela ainda existir na lista
            if(currentSelection) {
                sel.value = currentSelection;
            }

            const list = document.getElementById('product-list');
            list.innerHTML = '<h4>Lista de Produtos:</h4>';
            db.products.forEach((p, i) => {
                list.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:13px;">${p.name} (${p.val}${p.unit[0]})</span>
                    <button onclick="deleteProduct(${i})" style="width:auto; padding:2px 8px; margin:0; background:var(--danger); color:white; font-size:10px;">X</button>
                </div>`;
            });

            const tbody = document.querySelector('#report-table tbody');
            tbody.innerHTML = '';
            db.logs.slice().reverse().forEach(l => {
                tbody.innerHTML += `<tr><td>${l.time}</td><td>${l.user}</td><td>${l.prod}</td><td>${l.qty}</td></tr>`;
            });
        }

        function restoreDefault() {
            if(confirm("Deseja restaurar a lista original da Five Points? Isso apagará alterações manuais.")) {
                db.products = defaultProducts;
                updateUI();
                syncToCloud();
            }
        }

        function saveNewProduct() {
            const name = document.getElementById('new-prod-name').value.toUpperCase();
            const val = document.getElementById('new-prod-val').value;
            const unit = document.getElementById('new-prod-unit').value;
            if(!name || !val) return;
            db.products.push({ name, val, unit });
            updateUI();
            syncToCloud();
        }

        function deleteProduct(i) { db.products.splice(i, 1); updateUI(); syncToCloud(); }

        function handlePrint() {
            const user = document.getElementById('sel-user').value;
            const prodEl = document.getElementById('sel-prod');
            const qty = parseInt(document.getElementById('sel-qty').value);
            
            if(!user || !prodEl.value) return;

            // 1. CAPTURAR OS DADOS DO PRODUTO PRIMEIRO (Antes da interface atualizar)
            const selected = prodEl.options[prodEl.selectedIndex];
            const productName = selected.text;
            const valVal = parseInt(selected.getAttribute('data-val'));
            const valUnit = selected.getAttribute('data-unit');
            
            const now = new Date();
            const timeStr = now.toLocaleDateString('pt-BR') + ' ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            
            let valDate = new Date(now);
            if(valUnit === 'days') valDate.setDate(valDate.getDate() + valVal);
            else valDate.setHours(valDate.getHours() + valVal);
            const valStr = valDate.toLocaleDateString('pt-BR') + ' ' + valDate.getHours().toString().padStart(2,'0') + ':' + valDate.getMinutes().toString().padStart(2,'0');

            // 2. REGISTRAR O RELATÓRIO E ATUALIZAR INTERFACE
            db.logs.push({ time: timeStr, user, prod: prodEl.value, qty });
            updateUI(); // Aqui a lista é reconstruída, mas nós já salvamos o 'productName' lá em cima!
            syncToCloud();

            // 3. DESENHAR A ETIQUETA COM OS DADOS SALVOS
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';

            for(let i=0; i<qty; i++) {
                printArea.innerHTML += `
                    <div class="etiqueta">
                        <h1>${productName}</h1>
                        <p><b>FAB:</b> ${timeStr}</p>
                        <p><b>VAL:</b> ${valStr}</p>
                        <p><b>RESP:</b> ${user}</p>
                        <div class="footer">FIVE POINTS BURGUER</div>
                    </div>
                `;
            }
            window.print();
        }

        async function syncToCloud() {
            if(!GOOGLE_SCRIPT_URL) return;
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(db) }); } catch(e) {}
        }

        async function downloadCSV() {
            let csv = "Data;Resp;Prod;Qtd\n";
            db.logs.forEach(l => csv += `${l.time};${l.user};${l.prod};${l.qty}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "relatorio.csv";
            link.click();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
